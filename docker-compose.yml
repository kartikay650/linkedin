services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: linkedin
      POSTGRES_PASSWORD: linkedin
      POSTGRES_DB: linkedin
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
    volumes:
      - ./client_docs:/app/client_docs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Automatic discovery is DISABLED — syncing is manual-only (dashboard "Sync now").
  # The scheduler was built for the per-burner model and predates the Apify switch;
  # re-enable (and adapt jobs/scheduler.py to iterate clients, not burners) only if
  # automatic syncing is wanted later.
  # scheduler:
  #   build: ./backend
  #   restart: unless-stopped
  #   env_file: .env
  #   depends_on:
  #     - postgres
  #     - redis
  #   volumes:
  #     - ./sessions:/app/sessions
  #   command: python -m app.jobs.scheduler

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    environment:
      DASHBOARD_USER: ${DASHBOARD_USER}
      DASHBOARD_PASSWORD_HASH: ${DASHBOARD_PASSWORD_HASH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile

volumes:
  postgres_data:
